name: Feature Request
description: Suggest a new tool, data source, or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Have an idea for osint-mcp-server? We'd love to hear it.

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New OSINT tool
        - New data source / provider
        - CLI improvement
        - GitHub Action improvement
        - MCP server improvement
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the feature you'd like to see.
      placeholder: "It would be useful to have a tool that..."
    validations:
      required: true

  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: How would this help your workflow?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any existing tools or workarounds you've tried?
