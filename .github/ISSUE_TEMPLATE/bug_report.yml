name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Please fill out the sections below.

  - type: dropdown
    id: mode
    attributes:
      label: Usage Mode
      description: How are you using osint-mcp-server?
      options:
        - MCP Server (Claude Desktop / AI agent)
        - CLI (npx osint-mcp-server --tool ...)
        - GitHub Action
    validations:
      required: true

  - type: input
    id: tool
    attributes:
      label: Tool Name
      description: Which tool is affected?
      placeholder: "e.g., dns_lookup, shodan_host, osint_domain_recon"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
      placeholder: "I ran dns_lookup with domain 'example.com' and got..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide a minimal command or config to reproduce the issue.
      placeholder: |
        npx osint-mcp-server --tool dns_lookup '{"domain":"example.com","type":"A"}'
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      description: Paste any error messages or logs.
      render: shell

  - type: input
    id: version
    attributes:
      label: Version
      description: "Run: npx osint-mcp-server --help | head -1"
      placeholder: "e.g., 0.2.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - GitHub Actions (ubuntu-latest)
        - Other
    validations:
      required: true
