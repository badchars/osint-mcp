<svg xmlns="http://www.w3.org/2000/svg" width="700" height="180" viewBox="0 0 700 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4" />
      <stop offset="50%" style="stop-color:#0ea5e9" />
      <stop offset="100%" style="stop-color:#8b5cf6" />
    </linearGradient>
    <linearGradient id="icon-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4" />
      <stop offset="100%" style="stop-color:#0ea5e9" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="700" height="180" rx="12" fill="url(#bg)" />

  <!-- Border accent line -->
  <rect x="0" y="0" width="700" height="3" rx="1.5" fill="url(#accent)" />

  <!-- OSINT Globe + Magnifying glass icon -->
  <g transform="translate(55, 32)">
    <!-- Globe outer circle -->
    <circle cx="52" cy="55" r="42" fill="url(#icon-fill)" opacity="0.1" stroke="url(#icon-fill)" stroke-width="2"/>
    <!-- Globe horizontal lines -->
    <ellipse cx="52" cy="40" rx="28" ry="8" fill="none" stroke="url(#icon-fill)" stroke-width="1.2" opacity="0.4"/>
    <ellipse cx="52" cy="55" rx="42" ry="10" fill="none" stroke="url(#icon-fill)" stroke-width="1" opacity="0.3"/>
    <ellipse cx="52" cy="70" rx="28" ry="8" fill="none" stroke="url(#icon-fill)" stroke-width="1.2" opacity="0.4"/>
    <!-- Globe vertical meridian -->
    <ellipse cx="52" cy="55" rx="15" ry="42" fill="none" stroke="url(#icon-fill)" stroke-width="1.2" opacity="0.5"/>
    <!-- Globe center vertical line -->
    <line x1="52" y1="13" x2="52" y2="97" stroke="url(#icon-fill)" stroke-width="1" opacity="0.3"/>
    <!-- Magnifying glass circle (overlapping bottom-right) -->
    <circle cx="76" cy="76" r="16" fill="none" stroke="url(#icon-fill)" stroke-width="2.5" opacity="0.9"/>
    <!-- Magnifying glass handle -->
    <line x1="87" y1="87" x2="100" y2="100" stroke="url(#icon-fill)" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <!-- Scan dot inside magnifier -->
    <circle cx="76" cy="76" r="4" fill="url(#icon-fill)" opacity="0.7"/>
    <!-- Pulse rings -->
    <circle cx="76" cy="76" r="9" fill="none" stroke="url(#icon-fill)" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
  </g>

  <!-- Title -->
  <text x="175" y="68" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#f0f6fc" letter-spacing="-0.5">
    osint-mcp
  </text>

  <!-- Subtitle -->
  <text x="175" y="98" font-family="'SF Pro Text', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="15" fill="#8b949e" letter-spacing="0.2">
    OSINT &amp; reconnaissance intelligence for AI agents
  </text>

  <!-- Stats pills -->
  <g transform="translate(175, 118)">
    <!-- 37 Tools -->
    <rect x="0" y="0" width="78" height="26" rx="13" fill="#06b6d4" opacity="0.12" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.3"/>
    <text x="39" y="17" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#06b6d4" text-anchor="middle" font-weight="600">37 tools</text>

    <!-- 12 Sources -->
    <rect x="90" y="0" width="92" height="26" rx="13" fill="#0ea5e9" opacity="0.12" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.3"/>
    <text x="136" y="17" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#0ea5e9" text-anchor="middle" font-weight="600">12 sources</text>

    <!-- MCP -->
    <rect x="194" y="0" width="58" height="26" rx="13" fill="#8b5cf6" opacity="0.12" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="223" y="17" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#8b5cf6" text-anchor="middle" font-weight="600">MCP</text>

    <!-- 2 deps -->
    <rect x="264" y="0" width="78" height="26" rx="13" fill="#3fb950" opacity="0.12" stroke="#3fb950" stroke-width="1" stroke-opacity="0.3"/>
    <text x="303" y="17" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#3fb950" text-anchor="middle" font-weight="600">2 deps</text>
  </g>
</svg>
